<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>사용 매뉴얼 — All-in-One 학교생활기록부 에디터</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");

        body {
            font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
            font-size: 16px;
            color: #334155;
            background: #f8fafc;
            letter-spacing: -0.01em;
        }

        #manual {
            max-width: 794px;
            margin: 0 auto;
            background: white;
            padding: 60px 80px;
        }

        @media screen {
            #manual > div + div {
                border-top: 1px solid #e2e8f0;
                margin-top: 8px;
                padding-top: 8px;
            }
        }

        @media print {
            @page { size: A4; }

            body {
                font-size: 11pt;
                color: #1e293b;
                background: white;
                margin: 0;
                padding: 0;
            }

            .page-break      { page-break-before: always; break-before: page; }
            .page-break-after { page-break-after: always; break-after: page; }

            * { box-shadow: none !important; }

            a { color: inherit !important; text-decoration: none !important; }

            .print-keep-bg {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            #loading { display: none !important; }

            #manual { padding: 0; max-width: 100%; }

            section { padding: 0 !important; margin-bottom: 0 !important; }

            table,
            .bg-slate-50, .bg-slate-100,
            .bg-indigo-50, .bg-amber-50, .bg-rose-50, .bg-emerald-50, .bg-blue-50 {
                break-inside: avoid;
                page-break-inside: avoid;
            }

            h3 { break-before: auto; }

            .print-thead-repeat {
                break-inside: auto;
                page-break-inside: auto;
            }
            .print-thead-repeat thead {
                display: table-header-group;
            }
            .print-thead-repeat tr {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>

<div id="loading"
     style="display:flex; align-items:center; justify-content:center; min-height:100vh; font-size:16px; color:#64748b;">
    문서를 불러오는 중입니다...
</div>

<div id="manual" style="display:none;"></div>

<script>
    const SECTIONS = [
        'sections/cover.html',
        'sections/toc.html',
        'sections/section1.html',
        'sections/section2.html',
        'sections/section3.html',
        'sections/section4.html',
        'sections/section5.html',
        'sections/section6.html',
        'sections/section7.html',
        'sections/section8.html',
        'sections/section9.html',
        'sections/section10.html',
        'sections/section11.html',
    ];

    async function loadSection(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.text();
        } catch (e) {
            return `<section class="page-break print-keep-bg p-8 text-center text-red-500 text-base">
          섹션을 불러오지 못했습니다: ${url}
        </section>`;
        }
    }

    async function init() {
        const results = await Promise.all(SECTIONS.map(loadSection));

        const manual = document.getElementById('manual');
        for (const html of results) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = html;
            manual.appendChild(wrapper);
        }

        document.getElementById('loading').style.display = 'none';
        manual.style.display = 'block';
    }

    init();
</script>
</body>
</html>
