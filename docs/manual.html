<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>사용 매뉴얼 — All-in-One 학교생활기록부 에디터</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");

        body {
            font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
            font-size: 16px;
            color: #334155;
            background: #f8fafc;
            letter-spacing: -0.01em;
        }

        #manual {
            max-width: 794px;
            margin: 0 auto;
            background: white;
            padding: 60px 80px;
        }

        @media screen {
            #manual > div + div {
                border-top: 1px solid #e2e8f0;
                margin-top: 8px;
                padding-top: 8px;
            }
        }

        @media print {
            @page { size: A4; }

            body {
                font-size: 11pt;
                color: #1e293b;
                background: white;
                margin: 0;
                padding: 0;
            }

            .page-break      { page-break-before: always; break-before: page; }
            .page-break-after { page-break-after: always; break-after: page; }

            * { box-shadow: none !important; }

            a { color: inherit !important; text-decoration: none !important; }

            .print-keep-bg {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            #loading { display: none !important; }

            #manual { padding: 0; max-width: 100%; }

            section { padding: 0 !important; margin-bottom: 0 !important; }

            table,
            .bg-slate-50, .bg-slate-100,
            .bg-indigo-50, .bg-amber-50, .bg-rose-50, .bg-emerald-50, .bg-blue-50 {
                break-inside: avoid;
                page-break-inside: avoid;
            }

            h3 { break-before: auto; }

            .print-thead-repeat {
                break-inside: auto;
                page-break-inside: auto;
            }
            .print-thead-repeat thead {
                display: table-header-group;
            }
            .print-thead-repeat tr {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }

        /* ═══════════════════════════════════════════
           UI MOCKUP — 라이트 테마 (잉크 절약 최적화)
           ═══════════════════════════════════════════ */
        .ui-callout { margin: 20px 0; }
        .ui-callout-label {
            font-size: 11px; font-weight: 700; color: #64748b;
            letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 7px 2px;
        }
        .ui-mock {
            background: #f8fafc; border: 2px solid #cbd5e1; border-radius: 12px;
            overflow: hidden; width: 100%;
            font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
            display: block; box-sizing: border-box;
        }

        /* ── Sidebar ── */
        .um-sidebar { background: #f1f5f9; width: 210px; flex-shrink: 0; border-right: 1px solid #e2e8f0; }
        .um-sidebar-header {
            display: flex; align-items: center; gap: 6px;
            padding: 12px 12px 10px; border-bottom: 1px solid #e2e8f0; background: white;
        }
        .um-title-badge {
            font-size: 10px; font-weight: 700; color: #92400e;
            background: #fef3c7; border: 1px solid #fde68a;
            border-radius: 4px; padding: 1px 6px; flex-shrink: 0;
        }
        .um-title-text { font-size: 13px; font-weight: 600; color: #334155; white-space: nowrap; }
        .um-nav { padding: 8px; display: flex; flex-direction: column; gap: 2px; }
        .um-nav-divider { height: 1px; background: #e2e8f0; margin: 4px; }
        .um-nav-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; border-radius: 8px;
            color: #64748b; font-size: 13px; font-weight: 500; white-space: nowrap;
        }
        .um-nav-item.um-active { background: #e0e7ff; color: #3730a3; font-weight: 700; }
        .um-nav-item i { width: 15px; text-align: center; font-size: 13px; flex-shrink: 0; }
        .um-footer-divider { height: 1px; background: #e2e8f0; margin: 4px 8px; }
        .um-footer-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; border-radius: 8px; color: #94a3b8; font-size: 13px;
        }
        .um-footer-item i { width: 15px; text-align: center; font-size: 13px; flex-shrink: 0; opacity: .7; }

        /* ── Section header ── */
        .um-section-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid #e2e8f0; background: white;
        }
        .um-section-title { font-size: 15px; font-weight: 700; color: #1e293b; margin: 0 0 3px; }
        .um-section-desc { font-size: 12px; color: #64748b; margin: 0; }
        .um-header-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

        /* ── Buttons ── */
        .um-btn-primary {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 7px 14px; border-radius: 10px;
            background: #3b5bdb; color: white;
            font-size: 13px; font-weight: 600; white-space: nowrap;
        }
        .um-btn-secondary {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 7px 12px; border-radius: 10px;
            background: white; border: 1.5px solid #3b5bdb;
            color: #3b5bdb; font-size: 13px; font-weight: 600; white-space: nowrap;
        }
        .um-btn-purple {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 9px; border-radius: 7px;
            background: #f5f3ff; border: 1px solid #c4b5fd;
            color: #6d28d9; font-size: 12px; font-weight: 600;
        }
        .um-btn-ghost {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 11px; border-radius: 8px;
            background: white; border: 1px solid #cbd5e1;
            color: #64748b; font-size: 12px; font-weight: 500;
        }

        /* ── Area card ── */
        .um-card-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px;
            padding: 16px;
        }
        .um-card {
            background: white; border: 1px solid #cbd5e1; border-radius: 12px;
            padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
        }
        .um-card-name { font-size: 14px; font-weight: 700; color: #1e293b; margin: 0; }
        .um-byte-badge {
            display: inline-block; font-size: 12px; font-weight: 700; color: #92400e;
            background: #fef3c7; border: 1px solid #fde68a;
            border-radius: 4px; padding: 1px 8px; white-space: nowrap;
        }
        .um-divider-thin { height: 1px; background: #e2e8f0; }
        .um-chip-row { display: flex; flex-wrap: wrap; gap: 4px; }
        .um-chip {
            display: inline-block; font-size: 11px; color: #1d4ed8;
            background: #eff6ff; border: 1px solid #bfdbfe;
            border-radius: 20px; padding: 1px 7px; white-space: nowrap;
        }
        .um-card-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 8px; border-top: 1px solid #f1f5f9;
        }
        .um-card-hint { font-size: 11px; color: #94a3b8; }

        /* ── Activity card ── */
        .um-area-badge {
            display: inline-block; font-size: 12px; font-weight: 600;
            border-radius: 4px; padding: 2px 9px; white-space: nowrap;
        }
        .um-area-ok  { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }
        .um-area-warn{ background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
        .um-area-err { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
        .um-act-card {
            background: white; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 14px; min-width: 160px; display: flex; flex-direction: column; gap: 6px;
        }
        .um-act-name { font-size: 14px; font-weight: 700; color: #1e293b; margin: 0; }
        .um-act-record { font-size: 11px; color: #3b5bdb; font-weight: 500; margin: 0; }
        .um-rec-count { font-size: 12px; color: #3b5bdb; font-weight: 500; }
        .um-rec-count-empty { font-size: 12px; color: #94a3b8; }
        .um-act-footer {
            display: flex; align-items: center; gap: 5px;
            padding-top: 8px; border-top: 1px solid #f1f5f9; justify-content: flex-end; margin-top: 4px;
        }
        .um-act-icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 26px; height: 26px; border-radius: 6px; border: 1px solid #e2e8f0;
            background: #f8fafc; color: #94a3b8; font-size: 11px;
        }
        .um-act-icon-btn.um-danger { color: #dc2626; border-color: #fecaca; background: #fef2f2; }

        /* ── Student table ── */
        .um-table { width: 100%; border-collapse: collapse; }
        .um-table th {
            font-size: 11px; font-weight: 600; color: #64748b; text-align: left;
            padding: 7px 12px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0;
            text-transform: uppercase; letter-spacing: .04em;
        }
        .um-table td { font-size: 13px; color: #334155; padding: 7px 12px; border-bottom: 1px solid #f1f5f9; }
        .um-table tr:last-child td { border-bottom: none; }
        .um-group-row td {
            font-size: 12px; font-weight: 600; color: #3b5bdb;
            background: #f0f5ff; padding: 6px 12px;
            border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0;
        }
        .um-count-hint { font-size: 11px; color: #94a3b8; font-weight: 400; margin-left: 6px; }
        .um-edit-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 24px; height: 24px; border-radius: 5px; border: 1px solid #e2e8f0;
            background: white; color: #94a3b8; font-size: 11px;
        }

        /* ── Record grid ── */
        .um-grid-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
        }
        .um-grid-select-label { font-size: 12px; color: #64748b; white-space: nowrap; }
        .um-grid-select {
            background: white; border: 1px solid #cbd5e1; border-radius: 7px;
            color: #334155; font-size: 13px; font-weight: 600; padding: 4px 8px;
        }
        .um-select {
            background: white; border: 1px solid #cbd5e1; border-radius: 7px;
            color: #334155; font-size: 13px; font-weight: 600; padding: 4px 8px;
        }
        .um-grid-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .um-grid-table th {
            font-size: 11px; font-weight: 600; color: #64748b;
            padding: 6px 10px; background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; text-align: left;
        }
        .um-grid-table td {
            padding: 6px 10px; border-bottom: 1px solid #f1f5f9;
            border-right: 1px solid #f1f5f9; vertical-align: top; color: #334155; font-size: 13px;
        }
        .um-grid-name { font-size: 13px; color: #334155; font-weight: 500; }
        .um-grid-sub { font-size: 11px; color: #94a3b8; }
        .um-grid-cell { font-size: 11px; color: #475569; line-height: 1.5; }
        .um-grid-cell-empty { font-size: 11px; color: #cbd5e1; font-style: italic; }
        .um-cell-content { font-size: 12px; color: #475569; line-height: 1.6; }
        .um-cell-over { background: #fef2f2; color: #b91c1c; }
        .um-byte-ok  { font-size: 11px; font-weight: 700; color: #16a34a; }
        .um-byte-over{ font-size: 11px; font-weight: 700; color: #dc2626; }
        .um-sum-ok  { font-size: 12px; color: #16a34a; font-weight: 600; }
        .um-sum-warn{ font-size: 12px; color: #dc2626; font-weight: 600; }
        .um-row-warn td { background: #fef2f2 !important; }

        /* ── Home card ── */
        .um-home-wrap { padding: 24px; display: flex; justify-content: center; }
        .um-home-card {
            background: white; border: 1px solid #e2e8f0;
            border-radius: 16px; padding: 24px; width: 360px;
        }
        .um-home-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .um-logo-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: linear-gradient(135deg,#3b5bdb,#4c6ef5);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .um-home-title { font-size: 13px; font-weight: 700; color: #1e293b; margin: 0 0 3px; }
        .um-home-sub { font-size: 11px; color: #64748b; margin: 0; }
        .um-home-sep { height: 1px; background: #e2e8f0; margin: 0 0 16px; }
        .um-home-btn-a {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 11px 14px; border-radius: 11px; margin-bottom: 8px;
            background: linear-gradient(135deg,#3b5bdb,#4c6ef5); color: white;
            font-size: 13px; font-weight: 700; box-sizing: border-box;
        }
        .um-home-btn-b {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 11px 14px; border-radius: 11px;
            background: #f8fafc; border: 1px solid #e2e8f0;
            color: #334155; font-size: 13px; font-weight: 600; box-sizing: border-box;
        }

        /* ── Inspect ── */
        .um-inspect-row {
            display: flex; flex-direction: column; gap: 4px;
            padding: 10px 14px; border-bottom: 1px solid #f1f5f9;
        }
        .um-inspect-clean { opacity: .55; }
        .um-inspect-meta { display: flex; align-items: center; gap: 8px; }
        .um-inspect-name { font-size: 13px; font-weight: 700; color: #1e293b; }
        .um-inspect-area { font-size: 11px; color: #94a3b8; }
        .um-inspect-content { font-size: 12px; color: #475569; line-height: 1.7; }
        .um-inspect-highlight {
            background: #fef9c3; color: #92400e;
            border-radius: 2px; padding: 0 2px; font-weight: 700;
            border-bottom: 2px solid #fbbf24;
        }
        .um-inspect-tag {
            font-size: 11px; font-weight: 700; color: #b91c1c;
            background: #fef2f2; border: 1px solid #fecaca;
            border-radius: 4px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0;
        }
        .um-inspect-suggest { font-size: 11px; color: #16a34a; margin-top: 3px; }
        .um-inspect-text { font-size: 12px; color: #64748b; line-height: 1.6; }

        /* ── Replace rule list ── */
        .um-rule-row {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 8px; background: white;
            border: 1px solid #e2e8f0;
        }
        .um-rule-label {
            font-size: 10px; font-weight: 700; border-radius: 4px;
            padding: 2px 7px; white-space: nowrap; flex-shrink: 0;
        }
        .um-rule-builtin { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .um-rule-custom  { background: #f5f3ff; color: #6d28d9; border: 1px solid #c4b5fd; }
        .um-rule-body { display: flex; align-items: center; gap: 7px; flex: 1; flex-wrap: wrap; }
        .um-rule-regex {
            font-size: 10px; font-weight: 700; color: #92400e;
            background: #fffbeb; border: 1px solid #fde68a;
            border-radius: 3px; padding: 1px 5px; white-space: nowrap;
        }
        .um-rule-pattern { font-size: 12px; font-family: monospace; color: #0e7490; background: #f0fdff; border: 1px solid #bae6fd; border-radius: 4px; padding: 2px 6px; }
        .um-rule-arrow { font-size: 12px; color: #94a3b8; }
        .um-rule-replace { font-size: 12px; font-family: monospace; color: #166534; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px; padding: 2px 6px; }
        .um-rule-desc { font-size: 11px; color: #94a3b8; margin-left: auto; white-space: nowrap; }
        .um-rule-del { font-size: 11px; color: #cbd5e1; flex-shrink: 0; }

        /* ── Export wizard ── */
        .um-wizard {
            display: flex; align-items: center; gap: 0;
            padding: 14px 16px; background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .um-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .um-step-num {
            width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700;
        }
        .um-step-label { font-size: 10px; white-space: nowrap; }
        .um-step-done  .um-step-num   { background: #3b5bdb; color: white; }
        .um-step-done  .um-step-label { color: #3b5bdb; font-weight: 600; }
        .um-step-active .um-step-num  { background: #4c6ef5; color: white; box-shadow: 0 0 0 3px rgba(59,91,219,.2); }
        .um-step-active .um-step-label{ color: #3730a3; font-weight: 700; }
        .um-step-idle  .um-step-num   { background: #e2e8f0; color: #94a3b8; }
        .um-step-idle  .um-step-label { color: #94a3b8; }
        .um-step-line { flex: 1; height: 2px; background: #e2e8f0; margin: 0 4px 16px; }
        .um-line-done { background: #3b5bdb; }

        /* ── misc ── */
        .um-body { padding: 16px; }
        .um-flex { display: flex; }
        .um-flex-between { display: flex; justify-content: space-between; align-items: center; }
        .um-gap-8 { gap: 8px; }
        .um-p12 { padding: 12px; }
        .um-text-xs { font-size: 11px; }
        .um-text-muted { color: #64748b; }
        .um-text-body { color: #334155; }
        .um-mt4 { margin-top: 4px; }
        .um-mt8 { margin-top: 8px; }
    </style>
</head>
<body>

<div id="loading"
     style="display:flex; align-items:center; justify-content:center; min-height:100vh; font-size:16px; color:#64748b;">
    문서를 불러오는 중입니다...
</div>

<div id="manual" style="display:none;"></div>

<script>
    const SECTIONS = [
        'sections/cover.html',
        'sections/toc.html',
        'sections/section1.html',
        'sections/section2.html',
        'sections/section3.html',
        'sections/section4.html',
        'sections/section5.html',
        'sections/section6.html',
        'sections/section7.html',
        'sections/section8.html',
        'sections/section9.html',
        'sections/section10.html',
        'sections/section11.html',
    ];

    async function loadSection(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.text();
        } catch (e) {
            return `<section class="page-break print-keep-bg p-8 text-center text-red-500 text-base">
          섹션을 불러오지 못했습니다: ${url}
        </section>`;
        }
    }

    async function init() {
        const results = await Promise.all(SECTIONS.map(loadSection));

        const manual = document.getElementById('manual');
        for (const html of results) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = html;
            manual.appendChild(wrapper);
        }

        document.getElementById('loading').style.display = 'none';
        manual.style.display = 'block';
    }

    init();
</script>
</body>
</html>
